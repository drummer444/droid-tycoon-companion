name: Rebuild Excel from database

on:
  push:
    paths:
      - "database/droids.json"
      - "database/rebirths.json"
      - "scripts/build_excel.py"
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Build Excel workbook from JSON database
        run: python scripts/build_excel.py

      - name: Commit updated workbook if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-rebuild Excel tracker from database"
          file_pattern: "excel/DroidTycoonCompanion.xlsx"
